<!DOCTYPE html>
<html>
<head>
    <title>Our Journey ❤️</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            text-align: center;
            font-family: Arial;
            color: white;

            background-image: url("images/photobg.jpg");
            background-size: Cover;
            background-position: center;
            background-repeat: no-repeat;
            overflow-x: hidden;
        }

        .container {
            padding: 40px 20px;
        }

        h1 {
            text-shadow: 2px 2px 10px black;
            animation: heartbeat 2s infinite;
        }

        p {
            font-size: 18px;
            text-shadow: 2px 2px 8px black;
        }

        /* Heartbeat animation */
        @keyframes heartbeat {
            0% { transform: scale(1); }
            25% { transform: scale(1.05); }
            50% { transform: scale(1); }
        }

        /* Slideshow */
        .slideshow img {
            width: 60%;
            max-width: 450px;
            height: auto;
            border-radius: 15px;
            margin-top: 30px;
            transition: opacity 1s ease-in-out;
            box-shadow: 0 0 25px rgba(0,0,0,0.6);
        }

        /* Music Button */
        #musicBtn {
            position: fixed;
            top: 15px;
            right: 15px;
            padding: 10px 15px;
            background: #ff4d6d;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }

        /* Hearts */
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100vh); opacity: 0; }
        }

        .heart {
            position: fixed;
            bottom: -10px;
            font-size: 20px;
            animation: floatUp 5s linear;
        }

        /* Popup */
        #finalMessage {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            #finalMessage button {
            background: #ff4d6d;   /* pink */
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
}
        }

        #finalMessage div {
            background: white;
            color: black;
            padding: 25px;
            border-radius: 12px;
        }

        /* Mobile */
        @media (max-width: 600px) {
            .slideshow img {
                width: 80%;
            }
        }
    </style>
</head>

<body>

<button onclick="toggleMusic()" id="musicBtn">⏸ Pause</button>

<div class="container">

<h1>Our Beautiful Journey 💖</h1>

<audio id="bgMusic" loop>
    <source src="music1.mp3" type="audio/mpeg">
</audio>

<p id="message"></p>

<div class="slideshow">
    <img id="slide" src="images/Photo1.jpg">
</div>

</div>

<!-- Final Message -->
<div id="finalMessage">
    <div>
        <h1>To My Forever ❤️</h1>
        <p>These 5 years were not just time… they were my life 💖</p>
        <p>You are my happiness, my strength, my home 🏡</p>
        <p>No matter what happens… I will always choose you ❤️</p>
        <p>Happy 5th Anniversary 💕</p>
        <button onclick="closeMessage()">Close</button>
    </div>
</div>

<script>
// 🎵 MUSIC
window.onload = function() {
    let audio = document.getElementById("bgMusic");
    audio.volume = 0.3;
    audio.play().catch(()=>{});
    startSlideshow();
};

// 🎵 PLAY/PAUSE
function toggleMusic() {
    let audio = document.getElementById("bgMusic");
    let btn = document.getElementById("musicBtn");

    if (audio.paused) {
        audio.play();
        btn.innerHTML = "⏸ Pause";
    } else {
        audio.pause();
        btn.innerHTML = "▶ Play";
    }
}

// 💖 STORY SLIDES
let slides = [
    { img: "images/Photo1.jpg", text: "The day we became one ❤️" },
    { img: "images/photo2.jpeg", text: "Our Wedding day 😊" },
    { img: "images/photo3.jpeg", text: "Our journey began with love 💕" },
    { img: "images/photo4.jpeg", text: "Every moment became special 💖" },
    { img: "images/photo5.jpeg", text: "Laughing, loving, growing together 😍" },
    { img: "images/photo6.jpeg", text: "Through every up and down 🤝" },
    { img: "images/photo7.jpeg", text: "You were always my strength 💪❤️" },
    { img: "images/photo8.jpeg", text: "Making memories every day 📸" },
    { img: "images/photo9.jpeg", text: "5 beautiful years of togetherness 💕" },
    { img: "images/photo10.jpeg", text: "And a lifetime still to go ❤️" }
];

let index = 0;

function startSlideshow() {
    setInterval(() => {
        let img = document.getElementById("slide");
        let text = document.getElementById("message");

        img.style.opacity = 0;

        setTimeout(() => {
            index = (index + 1) % slides.length;

            img.src = slides[index].img;
            text.innerHTML = slides[index].text;

            img.style.opacity = 1;

            if (index === slides.length - 1) {
                setTimeout(showFinalMessage, 3000);
            }

        }, 1000);

    }, 4000);
}

// 💌 FINAL MESSAGE
function showFinalMessage() {
    document.getElementById("finalMessage").style.display = "flex";
}

function closeMessage() {
    document.getElementById("finalMessage").style.display = "none";
}

// 💖 HEARTS
setInterval(() => {
    let heart = document.createElement("div");
    heart.innerHTML = "💖";
    heart.className = "heart";
    heart.style.left = Math.random() * 100 + "vw";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}, 400);

</script>

</body>
</html>
